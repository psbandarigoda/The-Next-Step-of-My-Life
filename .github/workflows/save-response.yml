name: Save response

# Triggered remotely (by the relay "doorbell") whenever a girl submits her answer
# from any device/country. The job appends her answer into the repo's XML files
# and commits it, so the Admin page sees it automatically.
on:
  repository_dispatch:
    types: [new-response]

permissions:
  contents: write

# Make sure two submissions at the same time don't collide while pushing.
concurrency:
  group: save-response
  cancel-in-progress: false

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append the response to the XML files
        env:
          RESPONSE_JSON: ${{ toJSON(github.event.client_payload) }}
        run: node scripts/append-response.mjs

      - name: Commit if something changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --staged --quiet; then
            echo "No new response to commit."
          else
            git commit -m "New response (auto-saved from a girl's device)"
            git push
          fi
